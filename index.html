<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="免费在线图片压缩工具，无需上传服务器，本地压缩保护隐私。支持 JPEG / PNG / WebP 格式。">
<title>图片压缩器 - 免费在线压缩，保护隐私</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fafafa;color:#1a1a2e;min-height:100vh}
.container{max-width:680px;margin:0 auto;padding:24px 16px}
header{text-align:center;padding:40px 0 20px}
header h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:#666;margin-top:8px;font-size:14px}
.drop-zone{border:2px dashed #d0d5dd;border-radius:16px;padding:48px 24px;text-align:center;cursor:pointer;transition:all .2s;background:#fff}
.drop-zone:hover,.drop-zone.drag-over{border-color:#667eea;background:#f8f9ff}
.drop-zone .icon{font-size:48px;margin-bottom:12px}
.drop-zone .title{font-size:16px;font-weight:600;color:#333;margin-bottom:4px}
.drop-zone .hint{font-size:13px;color:#999}
#fileInput{display:none}
.preview-area{display:none;margin-top:24px}
.preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.preview-grid{grid-template-columns:1fr}}
.preview-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.preview-card .label{padding:10px 14px;font-size:12px;font-weight:600;color:#666;display:flex;justify-content:space-between;align-items:center}
.preview-card .label .size{font-size:13px;color:#333;font-weight:700}
.preview-card img{width:100%;display:block;max-height:300px;object-fit:contain;background:#f5f5f5}
.controls{margin-top:20px;background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.control-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.control-row:last-child{margin-bottom:0}
.control-row label{font-size:13px;font-weight:600;color:#555;min-width:60px}
.control-row input[type=range]{flex:1;accent-color:#667eea}
.control-row select{padding:8px 12px;border:1px solid #d0d5dd;border-radius:8px;font-size:14px;background:#fff}
.control-row .val{font-size:13px;font-weight:700;color:#667eea;min-width:36px;text-align:right}
.saved{color:#10b981;font-weight:700;font-size:14px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;width:100%;justify-content:center;margin-top:16px;font-size:16px;padding:14px}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-outline{border:1px solid #d0d5dd;background:#fff;color:#555}
.btn-outline:hover{background:#f5f5f5}
.ads-placeholder{margin-top:32px;padding:20px;background:#fff;border-radius:12px;text-align:center;color:#ccc;font-size:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
footer{text-align:center;padding:32px 0;color:#999;font-size:12px}
footer a{color:#667eea;text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📦 图片压缩器</h1>
    <p>纯本地压缩 · 不上传服务器 · 保护你的隐私</p>
  </header>
  <div class="drop-zone" id="dropZone">
    <div class="icon">🖼️</div>
    <div class="title">拖拽图片到此处，或点击上传</div>
    <div class="hint">支持 JPEG / PNG / WebP / BMP / SVG</div>
  </div>
  <input type="file" id="fileInput" accept="image/*">
  <div class="preview-area" id="previewArea">
    <div class="preview-grid">
      <div class="preview-card">
        <div class="label">📥 原始图片 <span class="size" id="origSize">-</span></div>
        <img id="origImg" alt="原始图片">
      </div>
      <div class="preview-card">
        <div class="label">📤 压缩后 <span class="size saved" id="newSize">-</span></div>
        <img id="newImg" alt="压缩后图片">
      </div>
    </div>
    <div class="controls">
      <div class="control-row">
        <label>质量</label>
        <input type="range" id="quality" min="10" max="100" value="70">
        <span class="val" id="qualVal">70%</span>
      </div>
      <div class="control-row">
        <label>格式</label>
        <select id="format">
          <option value="image/jpeg">JPEG</option>
          <option value="image/png">PNG</option>
          <option value="image/webp">WebP</option>
        </select>
        <span id="savedPercent" class="saved" style="margin-left:auto"></span>
      </div>
      <div class="control-row">
        <button class="btn btn-outline" id="resetBtn">🔄 重新选择</button>
      </div>
    </div>
    <button class="btn btn-primary" id="downloadBtn">⬇️ 下载压缩后的图片</button>
  </div>
  <div class="ads-placeholder">
    <p style="margin:0">📢 广告位 — 接入 Google AdSense 后自动展示</p>
  </div>
</div>
<footer>
  <p>图片完全在浏览器本地处理，不会上传到任何服务器。</p>
</footer>
<script>
const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput'),previewArea=document.getElementById('previewArea'),origImg=document.getElementById('origImg'),newImg=document.getElementById('newImg'),origSize=document.getElementById('origSize'),newSize=document.getElementById('newSize'),quality=document.getElementById('quality'),qualVal=document.getElementById('qualVal'),format=document.getElementById('format'),downloadBtn=document.getElementById('downloadBtn'),resetBtn=document.getElementById('resetBtn'),savedPercent=document.getElementById('savedPercent');
let originalFile=null,compressedBlob=null;
dropZone.addEventListener('click',()=>fileInput.click());
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0])});
fileInput.addEventListener('change',e=>{if(e.target.files.length)handleFile(e.target.files[0])});
resetBtn.addEventListener('click',()=>{previewArea.style.display='none';dropZone.style.display='';originalFile=null;compressedBlob=null;fileInput.value=''});
quality.addEventListener('input',()=>{qualVal.textContent=quality.value+'%';if(originalFile)compress()});
format.addEventListener('change',()=>{if(originalFile&&format.value==='image/png'){quality.value=100;qualVal.textContent='100%';quality.disabled=true}else{quality.disabled=false};if(originalFile)compress()});
downloadBtn.addEventListener('click',()=>{if(!compressedBlob)return;const url=URL.createObjectURL(compressedBlob),a=document.createElement('a');a.href=url;a.download='compressed.'+(format.value.split('/')[1]||'jpg');a.click();URL.revokeObjectURL(url)});
function handleFile(file){if(!file.type.startsWith('image/')){alert('请上传图片文件');return};originalFile=file;origSize.textContent=formatBytes(file.size);const reader=new FileReader();reader.onload=e=>{origImg.src=e.target.result;compress()};reader.readAsDataURL(file);dropZone.style.display='none';previewArea.style.display='block';if(format.value==='image/png'){quality.value=100;qualVal.textContent='100%';quality.disabled=true}}
function compress(){const img=new Image();img.onload=()=>{const canvas=document.createElement('canvas');canvas.width=img.width;canvas.height=img.height;const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0);const mime=format.value,q=quality.value/100;canvas.toBlob(blob=>{compressedBlob=blob;const url=URL.createObjectURL(blob);newImg.src=url;newSize.textContent=formatBytes(blob.size);const pct=Math.round((1-blob.size/originalFile.size)*100);savedPercent.textContent=pct>0?('🎉 节省 '+pct+'%'):(pct===0?'大小不变':('⚠️ 增大 '+Math.abs(pct)+'%'))},mime,q)};img.src=origImg.src}
function formatBytes(b){if(b===0)return'0 B';const k=1024,sizes=['B','KB','MB','GB'],i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+sizes[i]}
</script>
</body>
</html>
